id: anomaly_pattern_expense_capitalization

name: 费用资本化异常模式

category: anomaly

dimension: earnings_quality

description: >
  二阶异常模式命中“费用资本化嫌疑”，说明费用确认时点可能被后移，
  应直接进入 thesis 的盈利质量判断。

required_facts:
  - anomaly_pattern_expense_capitalization

required_derived_facts: []

trigger_rules:

  medium:
    condition: anomaly_pattern_expense_capitalization >= 1

interpretation_templates:

  medium: >
    费用率下降同时伴随现金流/利润比率走弱，
    可能通过资本化研发或工程支出推迟费用确认，抬高当期利润。

  none: >
    未命中“费用资本化嫌疑”二阶异常模式。

critic_questions:
  - 研发支出资本化率是否显著高于同行业？
  - 资本化的研发项目是否已实际产生收入或技术成果？
  - 若恢复费用化处理，对当期利润的影响有多大？
  - 在建工程转固的进度是否异常缓慢？

thesis_impact:

  earnings_quality:
    medium: slightly_negative
    none: neutral
