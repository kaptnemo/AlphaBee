id: competitive_moat

name: 竞争壁垒

description: >
  评估公司是否具备可持续的竞争优势（护城河）。
  主要通过毛利率稳定性、收入质量和ROE趋势来判断：
  高且稳定的毛利率说明公司具备定价权；持续高ROE表明竞争优势带来持续超额回报；
  收入回款良好则证明客户依赖度高、议价能力强。

signal_dimension_key: competitive_moat

interpretation_templates:

  strong_positive: >
    公司竞争壁垒厚实：毛利率长期稳定高位、ROE持续超越行业、
    收入质量良好（客户回款顺畅）。这些指标共同表明公司具备
    真实的定价权和客户黏性，护城河可信度高，投资价值突出。

  positive: >
    公司具有良好的竞争壁垒，盈利能力稳定，
    未发现明显的竞争优势侵蚀迹象，市场地位较为稳固。

  neutral: >
    公司竞争壁垒一般，盈利指标有所波动但尚在合理范围，
    需结合行业竞争格局变化和产品周期综合判断。

  negative: >
    公司竞争壁垒出现侵蚀迹象：毛利率持续收窄、ROE走弱，
    或收入增长但利润增速落后，竞争优势可能正在减弱。
    建议评估是否面临行业竞争加剧或议价能力下降。

  strong_negative: >
    公司竞争壁垒明显弱化：毛利率大幅下滑、ROE持续低迷，
    收入质量（回款、应收增速）同步恶化，护城河遭到严重侵蚀。
    当前商业模式的可持续性存疑，竞争地位面临实质威胁。
