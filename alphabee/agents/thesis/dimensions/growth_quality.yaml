id: growth_quality

name: 成长质量

description: >
  评估公司增长的可持续性与含金量。真正高质量的成长应同时满足：
  利润增速与营收增速匹配、应收账款不大幅超前扩张、资本扩张与回报匹配。
  本维度区分"真实增长"与"账面增长"，是判断未来成长预期可信度的核心。

signal_dimension_key: growth_quality

interpretation_templates:

  strong_positive: >
    公司成长质量出色。营收与利润同步增长、回款顺畅、扩张有序且回报可观，
    增长的真实性与可持续性均有充分的财务数据支撑，成长驱动力强健。

  positive: >
    公司成长质量良好，主要增长指标运行健康，
    暂未发现营收增速与利润、回款之间的明显背离，成长可持续性较强。

  neutral: >
    公司成长质量一般，部分指标出现轻度分化，
    建议进一步核查增长来源的稳定性和可持续性。

  negative: >
    公司增长质量出现风险信号：应收账款增速明显超前营收、
    或增收不增利迹象明显、或扩张带来过高财务杠杆。
    当前增长的可持续性存疑，需核查增长的真实驱动因素。

  strong_negative: >
    公司成长质量严重恶化。增长指标多项出现背离：高速扩张伴随
    盈利能力下滑、回款恶化、债务高企，现有增长模式存在重大风险，
    不具备可持续性。
