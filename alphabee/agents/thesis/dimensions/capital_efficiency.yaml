id: capital_efficiency

name: 资本配置效率

description: >
  评估管理层在资本分配上的效率与股东回报能力。
  高效的资本配置应体现在：ROE长期稳定在合理水平、经营现金流充裕、
  资本支出产生可见回报，以及向股东返还利润（分红/回购）的能力。
  本维度是衡量管理层"为股东创造价值"的核心指标。

signal_dimension_key: capital_efficiency

interpretation_templates:

  strong_positive: >
    公司资本配置效率优秀：ROE持续稳定、经营现金流充裕、
    分红或回购回馈股东，资本支出产出比合理。
    管理层展现出强烈的股东回报意识，具备优秀的资本配置能力。

  positive: >
    公司资本配置效率良好，ROE维持在合理水平，
    现金流支撑业务发展的同时有一定股东回报能力，整体较为健康。

  neutral: >
    公司资本配置效率一般，部分指标存在轻度不足，
    需进一步观察资本支出回报率和股东回报策略。

  negative: >
    公司资本配置效率偏低：ROE不理想且现金流质量欠佳，
    或资本支出强度高而回报不明显，分红能力不足。
    管理层在资本分配上存在效率损耗，需关注项目回报和资金用途。

  strong_negative: >
    公司资本配置效率堪忧：ROE长期低迷、经营现金流不足、
    高资本支出未见回报，股东回报能力极弱。
    资金存在低效占用甚至浪费的风险，管理层资本配置能力受到质疑。
