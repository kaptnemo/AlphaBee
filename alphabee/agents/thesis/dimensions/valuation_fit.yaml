id: valuation_fit

name: 估值合理性

description: >
  评估公司当前市场定价与基本面的匹配程度。合理的估值应与盈利增速、
  ROE 水平和历史估值中枢协调一致。本维度不判断绝对价格高低，
  而聚焦于"当前定价是否与公司内在价值相符"。

signal_dimension_key: valuation_fit

interpretation_templates:

  strong_positive: >
    公司估值与基本面高度匹配：PEG合理、PB-ROE匹配度好，
    当前定价充分反映了公司的成长性和盈利能力，
    未发现明显高估或错配风险，配置性价比高。

  positive: >
    公司估值基本合理，当前定价与盈利增速和历史估值中枢相符，
    估值泡沫风险较低，具有一定配置吸引力。

  neutral: >
    公司估值处于中性区间，既无明显高估也无明显低估，
    估值水平需结合行业比较和未来盈利预期综合判断。

  negative: >
    公司当前估值偏高，PEG或历史估值溢价偏高，
    需要较高的盈利增速方能支撑当前定价，
    若增长预期不及，存在估值回归压力。

  strong_negative: >
    公司估值严重脱离基本面支撑：PEG高企且PB远超ROE合理定价，
    当前定价反映了过高的预期，估值回归风险显著，
    建议在基本面改善前保持审慎。
