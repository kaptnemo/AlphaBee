id: operational_stability

name: 经营稳定性

description: >
  评估公司财务数据的内部一致性与经营结果的可信度。
  异常的财务勾稽关系、多指标交叉验证失败、或高债务杠杆，
  往往是经营不稳定的早期信号。本维度聚焦于"数据可信度"和"偿债安全边际"，
  是投资决策中的基础验证层。

signal_dimension_key: operational_stability

interpretation_templates:

  strong_positive: >
    公司财务数据内部一致、多维度交叉验证通过，
    债务结构合理且偿付能力充裕。经营表现稳健，
    信息质量可信度高，投资决策基础扎实。

  positive: >
    公司经营稳定性较好，财务数据逻辑一致，债务风险可控，
    未发现显著的数据异常或偿债压力信号。

  neutral: >
    公司经营稳定性处于中性区间，存在个别轻度预警，
    需关注财务勾稽异常是否有合理解释，以及债务结构是否持续改善。

  negative: >
    公司经营稳定性出现隐患：财务勾稽关系存在异常、
    多指标交叉验证未通过，或债务杠杆偏高影响安全边际。
    需深入核查财务数据的真实性和债务可持续性。

  strong_negative: >
    公司经营稳定性严重堪忧：多处财务异常聚集、财务勾稽关系多处断裂，
    同时伴随高杠杆债务压力。财务数据可信度存疑，
    偿债能力面临严峻挑战，基本面风险极高。
