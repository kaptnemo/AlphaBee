# 一阶勾稽关系检查规则 — 《手把手教你读财报》框架
#
# 每条规则检查两个指标之间的关系是否偏离历史基线。
# 字段使用 AlphaBee canonical 命名，需与 FinancialSnapshot 字段名一致。
# verify_questions: 触发后建议去财报附注核查的路径。

rules:

  # ═══════════════════════════════════════════════════════════════
  # ① 应收/营收背离
  # ═══════════════════════════════════════════════════════════════
  - id: ar_revenue_gap
    name: "应收/营收背离"
    description: >
      应收账款增速与营收增速的差值偏离历史基线。
      应收增速持续高于营收增速意味着公司通过放宽信用政策
      透支收入增长，回款质量在恶化。
    metric_a: accounts_receivable_yoy
    metric_b: revenue_yoy
    rule_type: gap
    anomaly_direction: spike
    threshold_sigma: 2.0
    book_ref: "《手财》第二章 应收账款"
    verify_questions:
      - 应收账款账龄结构是否恶化（1年以上占比是否上升）？
      - 坏账准备计提政策是否连贯、计提比例是否本期内下调？
      - 前5大客户是否在报告期末集中确认大额收入？
      - 是否有新增关联方作为主要欠款客户？

  # ═══════════════════════════════════════════════════════════════
  # ② 存货/营收背离
  # ═══════════════════════════════════════════════════════════════
  - id: inventory_revenue_gap
    name: "存货/营收背离"
    description: >
      存货增速显著高于营收增速。若毛利率同步上升可能是主动备货，
      若毛利率同步下降则可能是产品滞销或通过少结转成本虚增利润。
    metric_a: inventory_yoy
    metric_b: revenue_yoy
    rule_type: gap
    anomaly_direction: spike
    threshold_sigma: 2.0
    book_ref: "《手财》第三章 存货"
    verify_questions:
      - 存货中原材料/在产品/产成品的比例是否发生突变？
      - 存货跌价准备是否充足且计提政策连贯？
      - 产能利用率和产销率数据是否支持存货增长？
      - 同行业可比公司的存货周转天数变化趋势如何？

  # ═══════════════════════════════════════════════════════════════
  # ③ 现金流/利润背离
  # ═══════════════════════════════════════════════════════════════
  - id: cashflow_profit_ratio
    name: "现金流/利润背离"
    description: >
      经营现金流与净利润的比率显著低于历史基线。
      利润不含现金意味着利润停留在应收账款或存货中，含金量不足。
    metric_a: operating_cashflow
    metric_b: net_profit
    rule_type: ratio
    anomaly_direction: drop
    threshold_sigma: 2.0
    book_ref: "《手财》第四章 现金流量表"
    verify_questions:
      - 经营现金流恶化是应收账款增加还是存货增加导致？
      - 是否连续多期出现利润与现金流背离（查阅间接法现金流量表附表）？
      - 是否存在大额非经常性损益（资产处置、政府补贴）撑起利润？
      - 客户付款节奏或结算方式是否发生重大变化？
      - 是否存在大额票据结算导致收现延迟？

  # ═══════════════════════════════════════════════════════════════
  # ④ 毛利/费用背离
  # ═══════════════════════════════════════════════════════════════
  - id: margin_expense_gap
    name: "毛利/费用背离"
    description: >
      毛利率与三费占比（销售+管理+财务+研发费用率合计）的变化方向
      背离历史基线。若毛利率提升但费用率同步飙升，盈利改善可能
      被费用侵蚀；若毛利率下降但费用率异常下降，可能存在费用
      资本化或费用跨期调节。
    metric_a: gross_margin
    metric_b: sales_expense_ratio
    rule_type: gap
    anomaly_direction: any
    threshold_sigma: 2.0
    book_ref: "《手财》第六章 费用分析"
    verify_questions:
      - 销售费用/管理费用/财务费用/研发费用中哪一项变化最显著？
      - 研发费用资本化率是否上升（查无形资产附注中开发支出变动）？
      - 销售费用中是否存在异常大额的促销费或渠道返利？
      - 管理费用中是否有大额一次性计提或冲回？

  # ═══════════════════════════════════════════════════════════════
  # ⑤ 折旧/固定资产背离
  # ═══════════════════════════════════════════════════════════════
  - id: depreciation_rate
    name: "折旧/固定资产背离"
    description: >
      折旧与摊销占固定资产的比例显著低于历史基线。
      比率下降可能意味着公司通过延长折旧年限或少提折旧
      来减少费用、调节利润。
    metric_a: depreciation_amortization
    metric_b: fixed_assets_total
    rule_type: ratio
    anomaly_direction: drop
    threshold_sigma: 2.0
    book_ref: "《手财》第四章 固定资产与折旧"
    verify_questions:
      - 会计政策附注中折旧方法、折旧年限、残值率是否发生变更？
      - 固定资产成新率（净值/原值）是否支持当前的折旧率？
      - 同行业可比公司的折旧政策是否可比？
      - 若按行业平均折旧率重算，对净利润的影响有多大？

  # ═══════════════════════════════════════════════════════════════
  # ⑥ 税费/利润背离
  # ═══════════════════════════════════════════════════════════════
  - id: effective_tax_rate
    name: "税费/利润背离"
    description: >
      所得税占利润总额的比例显著低于法定税率（25%）。
      异常低的有效税率可能通过子公司利润转移、税收优惠滥用
      或递延所得税资产虚增来美化利润。
    metric_a: income_tax_expense
    metric_b: total_profit
    rule_type: ratio
    anomaly_direction: drop
    threshold_sigma: 2.0
    use_statutory: true
    statutory_rate: 0.25
    book_ref: "《手财》第七章 所得税"
    verify_questions:
      - 所得税费用附注中"会计利润与所得税费用调节表"各项差异说明是什么？
      - 享受的税收优惠是否具有可持续性（高新企业认证到期日）？
      - 递延所得税资产（DTA）的确认是否合理、可回收性是否充分？
      - 是否存在大额未确认的递延所得税负债？

  # ═══════════════════════════════════════════════════════════════
  # ⑦ 薪酬/员工背离
  # ═══════════════════════════════════════════════════════════════
  - id: salary_per_capita
    name: "薪酬/员工背离"
    description: >
      人均薪酬（支付给职工的现金/员工人数）偏离历史基线。
      畸高可能涉及关联输送或虚列薪酬套取资金；
      畸低可能通过压薪美化利润但不可持续。
    metric_a: salary_paid
    metric_b: employees
    rule_type: ratio
    anomaly_direction: any
    threshold_sigma: 2.0
    book_ref: "《手财》第六章 薪酬与关联交易"
    verify_questions:
      - 员工人数是否出现大幅变动（增员或裁员）导致人均薪酬失真？
      - 薪酬总额中是否包含一次性离职补偿或股权激励费用？
      - 人均薪酬与同行业同地区可比公司是否严重偏离？
      - 是否存在向高管或其关联方支付异常高额薪酬？

  # ═══════════════════════════════════════════════════════════════
  # ⑧ 利息/有息负债背离
  # ═══════════════════════════════════════════════════════════════
  - id: implied_interest_rate
    name: "利息/有息负债背离"
    description: >
      利息支出占带息债务的比例偏离市场利率区间。
      比率畸高意味着可能隐藏表外负债或高息借款；
      比率畸低意味着可能存在利息资本化（计入资产而非费用）。
    metric_a: interest_expense
    metric_b: interest_bearing_debt
    rule_type: ratio
    anomaly_direction: any
    threshold_sigma: 2.0
    book_ref: "《手财》第五章 有息负债"
    verify_questions:
      - 有息负债明细中各项借款的合同利率分别是多少？
      - 是否有大额利息被资本化计入在建工程或无形资产？
      - 是否存在对外担保、未决诉讼等表外负债？
      - 利息支出与利息收入（银行存款利率）的利差是否合理？

  # ═══════════════════════════════════════════════════════════════
  # ⑨ 大存大贷
  # ═══════════════════════════════════════════════════════════════
  - id: high_cash_high_debt
    name: "大存大贷"
    description: >
      货币资金和有息负债同时显著高于行业或历史基线。
      大存大贷的组合通常意味着资金可能被挪用、受限，
      或者存在表外资金池操作。
    metric_a: cash
    metric_b: interest_bearing_debt
    rule_type: codir
    anomaly_direction: spike
    threshold_sigma: 2.0
    book_ref: "《手财》第五章 货币资金"
    verify_questions:
      - 货币资金附注中受限资金（质押/保证金/冻结/定期存单）的金额和比例？
      - 利息收入/货币资金平均余额的比率是否合理（应不低于活期存款利率）？
      - 是否存在大股东及其关联方占用资金（查"其他应收款"附注）？
      - 审计报告是否对货币资金的存在性发表过非标意见？
      - 是否存在存贷双高但利息收支严重不匹配的情况？

  # ═══════════════════════════════════════════════════════════════
  # ⑩ 经营/投资现金流错配
  # ═══════════════════════════════════════════════════════════════
  - id: ocf_inv_gap
    name: "经营/投资现金流错配"
    description: >
      自由现金流缺口（经营+投资）持续为负且不断扩大，
      意味着经营造血不足以覆盖投资支出，依赖外部筹资维持。
      但若处于高速成长期，适度缺口属于正常扩张。
    metric_a: operating_cashflow
    metric_b: investing_cashflow
    rule_type: gap
    anomaly_direction: drop
    threshold_sigma: 2.0
    book_ref: "《手财》第四章 现金流量表"
    verify_questions:
      - 投资现金流主要流出方向（购建固定资产/对外投资/收购子公司）？
      - 资本开支项目的预期回报周期和已投产进度如何？
      - 筹资来源（银行借款/发债/增发）及其可持续性？
      - 若经营现金流不能覆盖投资支出，资金缺口还能维持几个季度？
